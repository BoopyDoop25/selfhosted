services:
  teamspeak:
    container_name: Teamspeak
    image: teamspeaksystems/teamspeak6-server
    restart: unless-stopped
    logging:
      driver: local
    ports:
      - 9987:9987/udp
      - 30033:30033/tcp
    environment:
      - TSSERVER_LICENSE_ACCEPTED=accept
    volumes:
      - teamspeak-data:/var/tsserver

volumes:
  teamspeak-data:
    name: teamspeak-data
